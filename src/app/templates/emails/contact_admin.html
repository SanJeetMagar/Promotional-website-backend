<html>
  <body style="
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #e0eafc, #cfdef3);
      margin: 0;
      padding: 40px;
      color: #333;
    ">
    <div style="
        max-width: 600px;
        margin: auto;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        padding: 30px 40px;
      ">
      
      <h2 style="
          text-align: center;
          color: #1a1a1a;
          font-weight: 700;
          letter-spacing: 0.5px;
          margin-bottom: 25px;
        ">
        ✉️ New Contact Message
      </h2>

      <div style="font-size: 16px; line-height: 1.6;">
        <p><strong style="color:#222;">👤 Name:</strong> {{ full_name }}</p>
        <p><strong style="color:#222;">📧 Email:</strong> {{ email }}</p>
        <p><strong style="color:#222;">📞 Phone:</strong> {{ phone }}</p>
        <p><strong style="color:#222;">🗂️ Subject:</strong> {{ subject }}</p>
      </div>

      <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.3); margin: 25px 0;" />

      <div style="
          background: rgba(255, 255, 255, 0.2);
          border-radius: 12px;
          padding: 20px;
          box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        ">
        <p style="margin: 0; color: #222;">{{ message|linebreaks }}</p>
      </div>

      <p style="
          text-align: center;
          font-size: 12px;
          color: #666;
          margin-top: 30px;
        ">
        Sent automatically via <strong>Choongshin</strong>
      </p>
    </div>
  </body>
</html>
